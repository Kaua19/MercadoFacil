<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h2 th:text="${product.id == null} ? 'New Product' : 'Edit Product'"></h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Barcode</label>
            <input type="text" class="form-control" th:field="*{barcode}">
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" class="form-control" th:field="*{category}">
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Price (R$)</label>
                <input type="number" step="0.01" class="form-control"
                       th:field="*{price}" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Cost (R$)</label>
                <input type="number" step="0.01" class="form-control"
                       th:field="*{cost}" required>
            </div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number" class="form-control"
                       th:field="*{stockQuantity}" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Minimum Stock</label>
                <input type="number" class="form-control"
                       th:field="*{minimumStock}" required>
            </div>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>

    </form>
</div>
</body>
</html>
